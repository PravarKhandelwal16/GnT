spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gnt?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    encoding: UTF-8

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.flywaydb: INFO
    org.hibernate.SQL: WARN

application:
  jwt:
    secret: ${JWT_SECRET:Z2l2ZWFuZHRha2Utc2VjcmV0LWtleS1mb3Itand0LXNpZ25pbmctMjAyNC1wcm9kdWN0aW9u}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
